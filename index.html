<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameShelf</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>GameShelf 🎮</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="mygames.html">My Games</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Welcome to GameShelf.</h2>
            <p>Discover your next favorite game.</p>
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="Search game">
                <button type="submit">🔍</button>
            </form>
        </section>
        <section class="filters">
            <h3>Filters</h3>
            <div class="filter-controls">
                Genre:
                <select name="genre" id="genreFilter">
                    <option value="">All</option>
                    <option value="action">Action</option>
                    <option value="rpg">RPG</option>
                    <option value="strategy">Strategy</option>
                    <option value="puzzle">Puzzle</option>
                </select>
            </div>
        </section>

        <p id="loading" style="display: none; text-align: center;">Loading games... 🎮</p>

        <section class="trending">
            <h2>Trending</h2>
            <div class="game-grid" id="gamesContainer">
                <!-- Games will be loaded dynamically by app.js -->
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
